<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AllInOne - Multi Business Canvas</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg0: #07050f;
      --bg1: #100820;
      --bg2: #160e2e;
      --purple: #7F77DD;
      --gold: #C4A84A;
      --blue: #378ADD;
      --white: #ffffff;
      --muted: #6a6a8a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg0);
      font-family: 'Syne', sans-serif;
      color: var(--white);
      user-select: none;
    }

    /* Command Bar */
    #command-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(16,8,32,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(127,119,221,0.2);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 1000;
    }

    .logo {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(90deg, var(--purple), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #add-fn-wrap {
      background: rgba(196,168,74,0.1);
      border: 1px solid var(--gold);
      padding: 8px 16px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-weight: 600;
      color: var(--gold);
    }

    #add-fn-wrap:hover { background: rgba(196,168,74,0.25); }

    .main-canvas {
      position: fixed;
      top: 56px; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(circle at 50% 50%, rgba(127,119,221,0.08) 0%, transparent 60%),
        var(--bg0);
      overflow: hidden;
    }

    #canvas {
      position: absolute;
      width: 100%; height: 100%;
      background-image: 
        radial-gradient(circle, rgba(127,119,221,0.25) 1px, transparent 1px);
      background-size: 28px 28px;
      transform-origin: 0 0;
    }

    .card {
      position: absolute;
      background: var(--bg1);
      border: 1px solid rgba(127,119,221,0.3);
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      min-width: 240px;
      overflow: hidden;
      cursor: move;
    }

    .card-header {
      padding: 12px 16px;
      background: var(--bg2);
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(127,119,221,0.2);
    }

    .card-body {
      padding: 14px;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- Command Bar -->
  <div id="command-bar">
    <div class="logo">AllInOne</div>

    <div id="add-fn-wrap" onclick="addNewFeature()">
      <span style="font-size:22px">+</span>
      <span>Add Function / Widget</span>
    </div>

    <div style="margin-left:auto; display:flex; gap:12px; align-items:center;">
      <button onclick="setMode('biz')" style="padding:8px 16px; background:var(--purple); border:none; border-radius:10px; color:white;">Business Mode</button>
      <button onclick="setMode('personal')" style="padding:8px 16px; background:var(--bg2); border:none; border-radius:10px;">Personal Mode</button>
    </div>
  </div>

  <!-- Canvas -->
  <div class="main-canvas" id="canvas-wrap">
    <div id="canvas"></div>
  </div>

<script>
// Basic state
let cardCounter = 0;

// Add new card
function addNewFeature() {
  const name = prompt("Enter feature name (e.g. Invoice System, Client CRM, Daily Journal):");
  if (!name) return;

  const canvas = document.getElementById('canvas');
  const card = document.createElement('div');
  card.className = 'card';
  card.style.left = (200 + Math.random() * 400) + 'px';
  card.style.top = (100 + Math.random() * 300) + 'px';
  card.style.zIndex = ++cardCounter;

  card.innerHTML = `
    <div class="card-header">
      <strong>${name}</strong>
      <span style="margin-left:auto; cursor:pointer; color:#e74c3c;" onclick="this.parentElement.parentElement.remove()">✕</span>
    </div>
    <div class="card-body">
      <textarea style="width:100%; height:120px; background:transparent; border:none; color:white; resize:none; outline:none;" placeholder="Write notes, plans, tasks..."></textarea>
      <div style="margin-top:12px; font-size:11px; color:var(--muted);">
        Drag to move • Right click for options
      </div>
    </div>
  `;

  // Make draggable
  makeDraggable(card);
  canvas.appendChild(card);
}

// Simple drag functionality
function makeDraggable(el) {
  let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;

  el.querySelector('.card-header').onmousedown = dragMouseDown;

  function dragMouseDown(e) {
    if (e.target.tagName === "TEXTAREA") return;
    e.preventDefault();
    pos3 = e.clientX;
    pos4 = e.clientY;
    document.onmouseup = closeDragElement;
    document.onmousemove = elementDrag;
  }

  function elementDrag(e) {
    e.preventDefault();
    pos1 = pos3 - e.clientX;
    pos2 = pos4 - e.clientY;
    pos3 = e.clientX;
    pos4 = e.clientY;
    el.style.top = (el.offsetTop - pos2) + "px";
    el.style.left = (el.offsetLeft - pos1) + "px";
  }

  function closeDragElement() {
    document.onmouseup = null;
    document.onmousemove = null;
  }
}

function setMode(mode) {
  alert(`Switched to ${mode === 'biz' ? 'Business' : 'Personal'} Mode\n\nYou can expand this later.`);
}

// Initialize with some starter cards
window.onload = () => {
  const starters = [
    "Main Shop Dashboard", 
    "Finance Overview", 
    "Daily Tasks", 
    "Personal Journal"
  ];
  
  starters.forEach(title => {
    const canvas = document.getElementById('canvas');
    const card = document.createElement('div');
    card.className = 'card';
    card.style.left = (150 + Math.random()*300) + 'px';
    card.style.top = (80 + Math.random()*200) + 'px';
    card.style.zIndex = ++cardCounter;
    card.innerHTML = `
      <div class="card-header">
        <strong>${title}</strong>
        <span style="margin-left:auto; cursor:pointer; color:#e74c3c;" onclick="this.parentElement.parentElement.remove()">✕</span>
      </div>
      <div class="card-body">
        <p>Click + in top bar to add more widgets.</p>
      </div>
    `;
    makeDraggable(card);
    canvas.appendChild(card);
  });
};
</script>
</body>
</html>
